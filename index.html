<body>

<div class="container">

<header>
  <h1>Asignación de Ruedas con A*</h1>
  <p class="subtitle">Algoritmo A* · costo mínimo</p>
</header>

<div class="card">

  <div class="card-title">
    Tabla de precios
  </div>

  <div style="overflow-x:auto">

    <table>

      <thead>
        <tr>
          <th></th>
          <th>Tipo T</th>
          <th>Tipo H</th>
          <th>Tipo V</th>
          <th>Tipo W</th>
        </tr>
      </thead>

      <tbody id="table-body"></tbody>

    </table>

  </div>

</div>

<div class="btn-container">
  <button class="btn-run" onclick="ejecutarAEstrella()">
    Ejecutar Búsqueda A*
  </button>
</div>

<div id="result-section">

  <div class="section-title">
    Resultado óptimo
  </div>

  <div class="stats-grid" id="stats-grid"></div>

  <div class="assign-grid" id="assign-grid"></div>

</div>

</div>

<script>

const EMPRESAS=[
  'Empresa1',
  'Empresa2',
  'Empresa3',
  'Empresa4'
];

const TIPOS=[
  'T',
  'H',
  'V',
  'W'
];

const preciosDefault={

  Empresa1:{
    T:20,
    H:30,
    V:20,
    W:40
  },

  Empresa2:{
    T:50,
    H:50,
    V:40,
    W:50
  },

  Empresa3:{
    T:60,
    H:55,
    V:50,
    W:60
  },

  Empresa4:{
    T:100,
    H:80,
    V:60,
    W:70
  }

};

const tbody=document.getElementById('table-body');

EMPRESAS.forEach(empresa=>{

  const tr=document.createElement('tr');

  tr.innerHTML=`
    <td>${empresa}</td>

    ${TIPOS.map(tipo=>`
      <td>
        <input
          class="price-input"
          type="number"
          id="p_${empresa}_${tipo}"
          value="${preciosDefault[empresa][tipo]}"
        >
      </td>
    `).join('')}
  `;

  tbody.appendChild(tr);

});

function obtenerPrecios(){

  const precios={};

  EMPRESAS.forEach(empresa=>{

    precios[empresa]={};

    TIPOS.forEach(tipo=>{

      precios[empresa][tipo]=parseInt(
        document.getElementById(`p_${empresa}_${tipo}`).value
      ) || 0;

    });

  });

  return precios;

}

function heuristica(estado,precios){

  const usadas=new Set(
    estado.map(([empresa])=>empresa)
  );

  const cubiertas=new Set(
    estado.map(([,tipo])=>tipo)
  );

  const pendientes=TIPOS.filter(
    tipo=>!cubiertas.has(tipo)
  );

  const disponibles=EMPRESAS.filter(
    empresa=>!usadas.has(empresa)
  );

  let h=0;

  for(const tipo of pendientes){

    h+=Math.min(
      ...disponibles.map(
        empresa=>precios[empresa][tipo]
      )
    );

  }

  return h;

}

function estadoKey(estado){

  return [...estado]
    .sort()
    .map(([empresa,tipo])=>`${empresa}:${tipo}`)
    .join('|');

}

function ejecutarAEstrella(){

  const precios=obtenerPrecios();

  const raiz={
    estado:[],
    g:0,
    h:heuristica([],precios)
  };

  let frontera=[raiz];

  let visitados=new Set();

  let solucion=null;

  let pasos=0;

  while(frontera.length>0 && !solucion){

    frontera.sort(
      (a,b)=>(a.g+a.h)-(b.g+b.h)
    );

    const nodo=frontera.shift();

    const key=estadoKey(nodo.estado);

    if(visitados.has(key)){
      continue;
    }

    visitados.add(key);

    pasos++;

    if(nodo.estado.length===TIPOS.length){

      solucion=nodo;

      break;

    }

    const usadas=new Set(
      nodo.estado.map(([empresa])=>empresa)
    );

    const cubiertas=new Set(
      nodo.estado.map(([,tipo])=>tipo)
    );

    const pendientes=TIPOS.filter(
      tipo=>!cubiertas.has(tipo)
    );

    const disponibles=EMPRESAS.filter(
      empresa=>!usadas.has(empresa)
    );

    const siguienteTipo=pendientes[0];

    for(const empresa of disponibles){

      const nuevoEstado=[
        ...nodo.estado,
        [empresa,siguienteTipo]
      ];

      const nuevoNodo={

        estado:nuevoEstado,

        g:
          nodo.g+
          precios[empresa][siguienteTipo],

        h:
          heuristica(
            nuevoEstado,
            precios
          )

      };

      frontera.push(nuevoNodo);

    }

  }

  mostrarResultado(
    solucion,
    precios,
    visitados.size,
    pasos
  );

}

function mostrarResultado(
  solucion,
  precios,
  nodos,
  pasos
){

  const result=document.getElementById(
    'result-section'
  );

  result.classList.add('visible');

  document.getElementById('stats-grid').innerHTML=`

    <div class="stat-card">
      <div class="stat-label">
        Costo total
      </div>

      <div class="stat-value stat-total">
        $${solucion.g}
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-label">
        Nodos explorados
      </div>

      <div class="stat-value">
        ${nodos}
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-label">
        Profundidad
      </div>

      <div class="stat-value">
        ${TIPOS.length}
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-label">
        Pasos
      </div>

      <div class="stat-value">
        ${pasos}
      </div>
    </div>

  `;

  const asignaciones=[...solucion.estado]
    .sort(
      (a,b)=>
      TIPOS.indexOf(a[1])-
      TIPOS.indexOf(b[1])
    );

  document.getElementById('assign-grid').innerHTML=
    asignaciones.map(([empresa,tipo])=>`

      <div class="assign-card">

        <div class="badge">
          ${tipo}
        </div>

        <div>

          <div class="assign-company">
            ${empresa}
          </div>

          <div class="assign-price">
            $${precios[empresa][tipo]}
          </div>

        </div>

      </div>

    `).join('');

}

</script>

</body>
</html>
