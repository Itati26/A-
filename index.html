<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Búsqueda A* — Asignación de Ruedas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a3a;
    --accent: #7c6af7;
    --accent2: #4fd1c5;
    --accent3: #f6ad55;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --success: #48bb78;
    --danger: #fc8181;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  header { text-align: center; margin-bottom: 3rem; }

  .badge {
    display: inline-block;
    background: rgba(124,106,247,0.15);
    border: 1px solid rgba(124,106,247,0.4);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    padding: 5px 14px;
    border-radius: 999px;
    margin-bottom: 1.2rem;
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3.4rem);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.75rem;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.95rem;
    font-weight: 400;
    font-family: 'DM Mono', monospace;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
    margin-bottom: 1.5rem;
  }

  .card-title {
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    color: var(--accent2);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    display: inline-block;
  }

  .price-table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
  }

  thead th {
    background: var(--surface2);
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 14px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  thead th:first-child { text-align: left; }

  tbody tr { border-bottom: 1px solid rgba(42,42,58,0.6); }
  tbody tr:last-child { border-bottom: none; }

  tbody td {
    padding: 10px 14px;
    text-align: center;
    color: var(--text);
  }

  tbody td:first-child {
    text-align: left;
    color: var(--muted);
    font-size: 0.8rem;
  }

  .price-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    width: 60px;
    padding: 4px 8px;
    text-align: center;
    transition: border-color 0.2s;
  }

  .price-input:focus { outline: none; border-color: var(--accent); }

  .btn-run {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    padding: 14px 32px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 30px rgba(124,106,247,0.35);
    margin: 0 auto;
  }

  .btn-run:hover { transform: translateY(-2px); box-shadow: 0 0 45px rgba(124,106,247,0.5); }
  .btn-run:active { transform: scale(0.97); }
  .btn-run.loading { opacity: 0.7; pointer-events: none; }
  .btn-run svg { transition: transform 0.3s; }
  .btn-run:hover svg { transform: rotate(15deg); }

  #result-section { display: none; }
  #result-section.visible { display: block; animation: fadeUp 0.5s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    text-align: center;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .stat-value { font-size: 1.6rem; font-weight: 800; color: var(--accent2); }
  .stat-value.total { color: var(--accent); font-size: 2rem; }

  .assign-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .assign-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 14px;
    opacity: 0;
    transform: translateY(10px);
    animation: popIn 0.4s ease forwards;
  }

  @keyframes popIn { to { opacity: 1; transform: translateY(0); } }

  .type-badge {
    width: 44px; height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .assign-info { flex: 1; }
  .assign-empresa { font-size: 0.9rem; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .assign-precio { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--success); }

  .section-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 2rem 0 1.5rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .section-divider::before,
  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .error-msg {
    background: rgba(252,129,129,0.1);
    border: 1px solid rgba(252,129,129,0.3);
    color: var(--danger);
    border-radius: 10px;
    padding: 12px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    text-align: center;
    margin-top: 1rem;
    display: none;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">Inteligencia Artificial — Búsqueda Informada</div>
    <h1>Asignación de Ruedas<br>con A*</h1>
    <p class="subtitle">f(n) = g(n) + h(n) &nbsp;·&nbsp; heurística admisible</p>
  </header>

  <div class="card">
    <div class="card-title">Tabla de precios (editable)</div>
    <div class="price-table-wrap">
      <table id="price-table">
        <thead>
          <tr>
            <th></th>
            <th>Tipo T</th>
            <th>Tipo H</th>
            <th>Tipo V</th>
            <th>Tipo W</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <div style="text-align:center; margin: 2rem 0;">
    <button class="btn-run" id="btn-run" onclick="ejecutarAEstrella()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      <span id="btn-label">Ejecutar Búsqueda A*</span>
    </button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div id="result-section">
    <div class="section-divider">Solución óptima</div>
    <div class="stats-row" id="stats-row"></div>
    <div class="assign-grid" id="assign-grid"></div>
  </div>
</div>

<script>
const EMPRESAS = ['Empresa1','Empresa2','Empresa3','Empresa4'];
const TIPOS    = ['T','H','V','W'];

const defaultPrecios = {
  Empresa1: {T:20, H:30, V:20, W:40},
  Empresa2: {T:50, H:50, V:40, W:50},
  Empresa3: {T:60, H:55, V:50, W:60},
  Empresa4: {T:100,H:80, V:60, W:70},
};

// Build editable table
const tbody = document.getElementById('table-body');
EMPRESAS.forEach(emp => {
  const tr = document.createElement('tr');
  tr.innerHTML = `<td>${emp}</td>` +
    TIPOS.map(t =>
      `<td><input class="price-input" id="p_${emp}_${t}" type="number" min="1" max="999" value="${defaultPrecios[emp][t]}"></td>`
    ).join('');
  tbody.appendChild(tr);
});

function getPrecios() {
  const p = {};
  EMPRESAS.forEach(emp => {
    p[emp] = {};
    TIPOS.forEach(t => {
      p[emp][t] = parseInt(document.getElementById(`p_${emp}_${t}`).value) || 0;
    });
  });
  return p;
}

async function ejecutarAEstrella() {
  const btn = document.getElementById('btn-run');
  const label = document.getElementById('btn-label');
  const errDiv = document.getElementById('error-msg');

  btn.classList.add('loading');
  label.textContent = 'Calculando...';
  errDiv.style.display = 'none';

  try {
    const precios = getPrecios();
    const resp = await fetch('/ejecutar', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ precios })
    });

    if (!resp.ok) throw new Error('Error en el servidor');
    const data = await resp.json();
    renderResultados(data);

  } catch (e) {
    errDiv.textContent = 'Error al conectar con el servidor Flask. ¿Está corriendo app.py?';
    errDiv.style.display = 'block';
  } finally {
    btn.classList.remove('loading');
    label.textContent = 'Ejecutar Búsqueda A*';
  }
}

function renderResultados(data) {
  const seccion = document.getElementById('result-section');
  seccion.classList.add('visible');

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Costo total</div>
      <div class="stat-value total">$${data.costo_total}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Asignaciones</div>
      <div class="stat-value">${data.asignacion.length}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Profundidad</div>
      <div class="stat-value">${TIPOS.length}</div>
    </div>
  `;

  const colors = ['#7c6af7','#4fd1c5','#f6ad55','#fc8181'];
  document.getElementById('assign-grid').innerHTML = data.asignacion.map((item, i) => `
    <div class="assign-card" style="animation-delay:${i*0.1}s">
      <div class="type-badge" style="background:rgba(${hexToRgb(colors[i])},0.15); border:1px solid rgba(${hexToRgb(colors[i])},0.4); color:${colors[i]}">${item.tipo}</div>
      <div class="assign-info">
        <div class="assign-empresa">${item.empresa}</div>
        <div class="assign-precio">$${item.precio} &nbsp;→ Tipo ${item.tipo}</div>
      </div>
    </div>
  `).join('');

  seccion.scrollIntoView({behavior:'smooth', block:'start'});
}

function hexToRgb(hex) {
  return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;
}
</script>
</body>
</html>
